name: OpenSRE CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn celery redis sqlalchemy pydantic-settings pydantic networkx pytest pytest-asyncio pytest-cov ruff httpx
          
      - name: Run Linters (Ruff)
        run: |
          ruff check .
          
      - name: Run Tests
        env:
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: sqlite:///./opensre_test.db
        run: |
          PYTHONPATH=. pytest
